<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Glow-Up Buddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:#efe9da;color:#631b40;
    font-family:"Lato",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{
    background:
      radial-gradient(1200px 700px at 20% 10%, #f5e2ea 0%, transparent 60%),
      radial-gradient(900px 600px at 90% 90%, #e0e2c8 0%, transparent 55%),
      #efe9da;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  /* sparkle keyframes used by App and ambient backdrop sparkles */
  @keyframes gub-sparkle{
    0%,100%{transform:scale(.85) rotate(0deg);opacity:.55}
    50%    {transform:scale(1.15) rotate(45deg);opacity:1}
  }
  @keyframes gub-float{
    0%,100%{transform:translateY(0px) rotate(0deg)}
    50%    {transform:translateY(-14px) rotate(20deg)}
  }
  .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .ambient span{position:absolute;color:#d292a8;display:block}
  .ambient span svg{width:100%;height:100%;display:block}
  .stage{position:relative;z-index:1}

  /* Hide scroll bars inside the device */
  .device-scroll::-webkit-scrollbar{display:none}

  /* Mobile: drop frame & go fullscreen */
  @media (max-width:520px){
    body{padding:0;align-items:stretch;background:#dfe0cc}
    .stage,.device-wrap{width:100%!important;height:100vh!important}
    .device-wrap > div{border-radius:0!important;width:100%!important;height:100%!important;box-shadow:none!important}
  }
</style>
</head>
<body>

<!-- Ambient sparkles behind the device -->
<div class="ambient" aria-hidden="true">
  <span style="top:8%; left:6%;  width:34px;height:34px;color:#d292a8;animation:gub-float 7s ease-in-out infinite"><svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 0 C58 36 64 42 100 50 C64 58 58 64 50 100 C42 64 36 58 0 50 C36 42 42 36 50 0Z"/></svg></span>
  <span style="top:18%; right:8%;width:22px;height:22px;color:#aeb080;animation:gub-float 5.2s ease-in-out infinite .8s"><svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 0 C58 36 64 42 100 50 C64 58 58 64 50 100 C42 64 36 58 0 50 C36 42 42 36 50 0Z"/></svg></span>
  <span style="bottom:14%;left:9%;width:28px;height:28px;color:#d292a8;animation:gub-float 6.4s ease-in-out infinite 1.6s"><svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 0 C58 36 64 42 100 50 C64 58 58 64 50 100 C42 64 36 58 0 50 C36 42 42 36 50 0Z"/></svg></span>
  <span style="bottom:8%; right:10%;width:38px;height:38px;color:#aeb080;animation:gub-float 7.8s ease-in-out infinite 2.3s"><svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 0 C58 36 64 42 100 50 C64 58 58 64 50 100 C42 64 36 58 0 50 C36 42 42 36 50 0Z"/></svg></span>
  <span style="top:46%; left:2%; width:18px;height:18px;color:#631b40;animation:gub-float 5.8s ease-in-out infinite 1.1s;opacity:.5"><svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 0 C58 36 64 42 100 50 C64 58 58 64 50 100 C42 64 36 58 0 50 C36 42 42 36 50 0Z"/></svg></span>
  <span style="top:55%; right:3%;width:20px;height:20px;color:#631b40;animation:gub-float 6.2s ease-in-out infinite 1.7s;opacity:.45"><svg viewBox="0 0 100 100"><path fill="currentColor" d="M50 0 C58 36 64 42 100 50 C64 58 58 64 50 100 C42 64 36 58 0 50 C36 42 42 36 50 0Z"/></svg></span>
</div>

<!-- App stage -->
<div class="stage">
  <div id="root"></div>
</div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- iOS device frame -->
<script type="text/babel" src="ios-frame.jsx"></script>
<!-- App -->
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
function Host(){
  // 430px wide device, height tuned for the content
  return (
    <div className="device-wrap" style={{
      width: 430, height: 880, position:'relative',
    }}>
      <IOSDevice width={430} height={880}>
        <div style={{width:'100%', height:'100%'}}>
          <App />
        </div>
      </IOSDevice>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Host />);
</script>

</body>
</html>
